<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boeny Nectar | L'Exception de Mahajanga</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning fs-3" href="#" id="nav-brand">Chargement...</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="#process">Fabrication</a></li>
                        <li class="nav-item"><a class="nav-link" href="#products">Boissons</a></li>
                        <li class="nav-item"><a class="nav-link" href="#testimonials">Avis</a></li>
                        <li class="nav-item"><a class="nav-link" href="#faq">FAQ</a></li>
                        <li class="nav-item"><a class="nav-link" href="#about">À Propos</a></li>
                        <li class="nav-item"><a class="nav-link" href="email_Javascript.html">Email</a></li>
                    </ul>
                    <button class="btn btn-warning fw-bold rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#orderModal">Commander</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- HERO -->
        <section id="hero" class="position-relative d-flex align-items-center justify-content-center text-center text-white" style="min-height: 85vh;">
            <div id="hero-carousel" class="carousel slide carousel-fade position-absolute w-100 h-100 top-0 start-0 z-n1" data-bs-ride="carousel" data-bs-interval="4000">
                <div class="carousel-inner h-100" id="hero-carousel-inner"></div>
                <div class="position-absolute w-100 h-100 top-0 start-0 bg-dark opacity-50"></div>
            </div>
            
            <div class="container z-1 reveal px-3">
                <h1 class="display-2 fw-bolder mb-4 shadow-lg-text text-uppercase" id="hero-headline"></h1>
                <p class="lead mb-5 fs-4 shadow-lg-text mx-auto" style="max-width: 800px;" id="hero-subheadline"></p>
                <button class="btn btn-warning btn-lg fw-bold rounded-pill px-5 py-3 shadow" id="hero-cta" data-bs-toggle="modal" data-bs-target="#orderModal"></button>
            </div>
        </section>

        <!-- AVANTAGES -->
        <section id="advantages" class="py-5 bg-white text-center">
            <div class="container my-5 reveal">
                <h2 class="display-6 fw-bold mb-5" id="adv-title"></h2>
                <div class="row g-4" id="adv-container"></div>
            </div>
        </section>

        <!-- PROCESSUS -->
        <section id="process" class="py-5 bg-light text-center border-top border-bottom">
            <div class="container my-5 reveal">
                <h2 class="display-6 fw-bold mb-5" id="process-title"></h2>
                <div class="row g-4 position-relative" id="process-container"></div>
            </div>
        </section>

        <!-- TERROIR -->
        <section id="terroir" class="py-5 bg-white">
            <div class="container my-5">
                <div class="row align-items-center">
                    <div class="col-lg-6 mb-4 mb-lg-0 reveal">
                        <h2 class="display-6 fw-bold mb-3 text-warning" id="terroir-title"></h2>
                        <p class="lead text-muted mb-4" id="terroir-lead"></p>
                        <div id="terroir-points-container"></div>
                    </div>
                    <div class="col-lg-6 reveal">
                        <img src="" id="terroir-image" class="img-fluid rounded shadow-lg" alt="Le terroir du Boeny">
                    </div>
                </div>
            </div>
        </section>

        <!-- PRODUITS -->
        <section id="products" class="py-5 bg-light">
            <div class="container my-5 reveal">
                <div class="text-center mb-5">
                    <h2 class="display-5 fw-bold text-dark" id="drinks-title"></h2>
                    <hr class="w-25 mx-auto text-warning border-3 opacity-100">
                </div>
                <div class="row g-4" id="drinks-container"></div>
            </div>
        </section>

        <!-- AVIS CLIENTS -->
        <section id="testimonials" class="py-5 bg-white text-center">
            <div class="container my-5 reveal">
                <h2 class="display-6 fw-bold mb-5" id="testi-title"></h2>
                <div class="row g-4" id="testi-container"></div>
            </div>
        </section>

        <!-- FAQ -->
        <section id="faq" class="py-5 bg-light border-top">
            <div class="container my-5 reveal">
                <h2 class="display-6 fw-bold text-center mb-5" id="faq-title"></h2>
                <div class="accordion mx-auto" id="faq-accordion" style="max-width: 800px;"></div>
            </div>
        </section>

        <!-- MODAL DE COMMANDE -->
        <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-md">
                <div class="modal-content rounded-4 border-0 shadow-lg">
                    <div class="modal-header border-bottom-0 bg-light rounded-top-4">
                        <h5 class="modal-title fw-bold fs-4" id="modal-title"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4 p-md-5">
                        <p class="text-center text-muted mb-4 fs-5" id="modal-subtitle"></p>
                        
                        <!-- Zone d'alerte insérée ici par le JS -->
                        <div id="modal-notice"></div>
                        
                        <div class="row justify-content-center">
                            <div class="col-12 text-center">
                                <h6 class="fw-bold mb-4 text-dark" id="direct-title"></h6>
                                <div class="d-grid gap-3" id="direct-buttons-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer id="about" class="bg-dark text-white pt-5 pb-3 mt-auto border-top border-warning border-4">
        <div class="container reveal">
            <div class="row mb-5 mt-3">
                <div class="col-lg-6 mb-4 mb-lg-0">
                    <h4 class="fw-bold text-warning mb-3 fs-3" id="about-title"></h4>
                    <p class="text-light opacity-75 pe-lg-5 fs-5" id="about-desc"></p>
                </div>
                <div class="col-lg-3 col-md-6 mb-4 mb-md-0">
                    <h5 class="fw-bold mb-3">Contact</h5>
                    <ul class="list-unstyled text-light opacity-75 fs-5">
                        <li class="mb-2"><i class="me-2">📍</i> <span id="about-address"></span></li>
                        <li class="mb-2"><i class="me-2">📞</i> <span id="about-phone"></span></li>
                        <li class="mb-2"><i class="me-2">✉️</i> <span id="about-email"></span></li>
                    </ul>
                </div>
                <div class="col-lg-3 col-md-6">
                    <h5 class="fw-bold mb-3">Réseaux Sociaux</h5>
                    <div id="about-socials" class="d-flex gap-2 flex-wrap"></div>
                </div>
            </div>
            <div class="text-center text-light opacity-50 mt-4">
                <p class="mb-0" id="footer-copyright"></p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
